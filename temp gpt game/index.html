<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pure JS 3D FPS</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
}
</style>
</head>
<body>
<div id="ui">Click to Start</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let mouse = { x: 0, y: 0 };
let player = { x: 0, y: 1.5, z: -5, yaw: 0, pitch: 0, health: 100 };
let bullets = [];
let enemies = [];
let speed = 0.1;
let gravity = 0.02;
let velocityY = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("click", () => {
  canvas.requestPointerLock();
});

document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === canvas) {
    player.yaw += e.movementX * 0.002;
    player.pitch -= e.movementY * 0.002;
    player.pitch = Math.max(-1.5, Math.min(1.5, player.pitch));
  }
});

document.addEventListener("mousedown", () => {
  bullets.push({
    x: player.x,
    y: player.y,
    z: player.z,
    vx: Math.sin(player.yaw) * 0.5,
    vy: Math.sin(player.pitch) * 0.5,
    vz: Math.cos(player.yaw) * 0.5
  });
});

// Create enemies
for (let i = 0; i < 10; i++) {
  enemies.push({
    x: (Math.random()-0.5)*20,
    y: 1.5,
    z: Math.random()*20,
    alive: true
  });
}

function project(x,y,z){
  let dx = x - player.x;
  let dy = y - player.y;
  let dz = z - player.z;

  let cosY = Math.cos(player.yaw);
  let sinY = Math.sin(player.yaw);
  let cosP = Math.cos(player.pitch);
  let sinP = Math.sin(player.pitch);

  let xz = cosY*dx - sinY*dz;
  let zz = sinY*dx + cosY*dz;
  let yz = cosP*dy - sinP*zz;
  zz = sinP*dy + cosP*zz;

  if (zz <= 0) return null;

  let scale = 800 / zz;
  return {
    x: canvas.width/2 + xz * scale,
    y: canvas.height/2 - yz * scale,
    scale: scale,
    depth: zz
  };
}

function drawEnemy(enemy){
  let p = project(enemy.x, enemy.y, enemy.z);
  if (!p) return;

  let size = 50 * p.scale/100;
  ctx.fillStyle = `rgb(${200 - p.depth*5},0,0)`;
  ctx.fillRect(p.x - size/2, p.y - size, size, size);
}

function update(){
  // Movement
  let forwardX = Math.sin(player.yaw) * speed;
  let forwardZ = Math.cos(player.yaw) * speed;
  let rightX = Math.cos(player.yaw) * speed;
  let rightZ = -Math.sin(player.yaw) * speed;

  if(keys["w"]){ player.x += forwardX; player.z += forwardZ; }
  if(keys["s"]){ player.x -= forwardX; player.z -= forwardZ; }
  if(keys["a"]){ player.x -= rightX; player.z -= rightZ; }
  if(keys["d"]){ player.x += rightX; player.z += rightZ; }

  // Gravity
  velocityY -= gravity;
  player.y += velocityY;
  if(player.y < 1.5){ player.y = 1.5; velocityY = 0; }

  // Bullets
  bullets.forEach(b=>{
    b.x += b.vx;
    b.y += b.vy;
    b.z += b.vz;
  });

  // Enemy AI
  enemies.forEach(e=>{
    if(!e.alive) return;
    let dx = player.x - e.x;
    let dz = player.z - e.z;
    let dist = Math.hypot(dx,dz);

    if(dist > 1){
      e.x += dx/dist * 0.02;
      e.z += dz/dist * 0.02;
    } else {
      player.health -= 0.1;
    }

    bullets.forEach(b=>{
      if(Math.hypot(b.x-e.x, b.z-e.z) < 0.5){
        e.alive = false;
      }
    });
  });

  if(player.health <= 0){
    ui.innerText = "GAME OVER";
  }
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  enemies.forEach(e=>{
    if(e.alive) drawEnemy(e);
  });

  // Crosshair
  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(canvas.width/2 -10, canvas.height/2);
  ctx.lineTo(canvas.width/2 +10, canvas.height/2);
  ctx.moveTo(canvas.width/2, canvas.height/2 -10);
  ctx.lineTo(canvas.width/2, canvas.height/2 +10);
  ctx.stroke();

  ui.innerText = "Health: " + Math.floor(player.health);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
